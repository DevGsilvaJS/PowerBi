<div class="lojas-dd" #root>
  <button
    type="button"
    class="lojas-dd__trigger"
    [class.lojas-dd__trigger--erro]="inputErro"
    [disabled]="lojas.length === 0"
    (click)="togglePainel($event)"
    [attr.aria-expanded]="aberto"
    aria-haspopup="listbox"
  >
    <span class="lojas-dd__value">{{ textoResumo }}</span>
    <span class="lojas-dd__caret" aria-hidden="true"></span>
  </button>

  <div *ngIf="aberto" class="lojas-dd__panel" role="listbox" (click)="$event.stopPropagation()">
    <div class="lojas-dd__toolbar">
      <button type="button" class="lojas-dd__link" (click)="selecionarTodas()">Todas</button>
      <button type="button" class="lojas-dd__link" (click)="limparSelecao()">Limpar</button>
    </div>
    <ul class="lojas-dd__lista">
      <li *ngFor="let l of lojas" class="lojas-dd__item">
        <label class="lojas-dd__label">
          <input
            type="checkbox"
            class="lojas-dd__check"
            [checked]="estaSelecionada(l.id)"
            (change)="alternar(l.id, $event)"
          />
          <span>{{ l.nome }}</span>
        </label>
      </li>
    </ul>
  </div>
</div>

<ng-container *ngIf="alertaUmaLojaAberto">
  <div
    class="lojas-dd-alert-backdrop"
    (click)="fecharAlertaUmaLoja()"
    role="presentation"
    aria-hidden="true"
  ></div>
  <div class="lojas-dd-alert-wrap" role="dialog" aria-modal="true" aria-labelledby="lojas-dd-alert-heading">
    <div class="lojas-dd-alert" (click)="$event.stopPropagation()">
      <div class="lojas-dd-alert__accent" aria-hidden="true"></div>
      <div class="lojas-dd-alert__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 8v5" />
          <path d="M12 16.2h.01" />
        </svg>
      </div>
      <h2 id="lojas-dd-alert-heading" class="lojas-dd-alert__title">Uma loja por consulta</h2>
      <p class="lojas-dd-alert__text">Selecione apenas uma loja para continuar.</p>
      <button type="button" class="lojas-dd-alert__btn" (click)="fecharAlertaUmaLoja()">Entendi</button>
    </div>
  </div>
</ng-container>
